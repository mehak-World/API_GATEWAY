services:

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "3001:3001"

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "3002:3002"

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "3000:3000"
    depends_on:
      - user-service
      - product-service
      